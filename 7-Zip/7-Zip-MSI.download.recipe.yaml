Description: Downloads latest 7-Zip MSI-file for Windows.
Identifier: com.github.NickETH.recipes.download.7-Zip-MSI
MinimumVersion: 1.3.1

Input:
  NAME: 7-Zip
  VENDOR: Igor Pavlov
  PF_STR_DL: '-x64'
  DOWNLOAD_FILE: 7-Zip
  USER_AGENT: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:81.0) Gecko/20100101 Firefox/81.0
  
Process:
- Processor: GitHubReleasesInfoProvider
  Arguments:
    # https://github.com/ip7z/7zip/releases/download/26.02/7z2602-x64.msi
    asset_regex: 7z([0-9]+)%PF_STR_DL%\.msi
    github_repo: ip7z/7zip
    include_prereleases: false

# - Processor: com.github.sebtomasi.SharedProcessors/TextSubstituer
  # Arguments:
    # input_string: '%version%'
    # pattern_replace:
    # - pattern: ersion_
      # repl: ''

- Processor: URLDownloader
  Arguments:
    filename: '%NAME%.msi'
    request_headers:
      user-agent: '%USER_AGENT%'
    url: '%url%'

- Processor: StopProcessingIf
  Arguments:
    predicate: download_changed == False

- Processor: EndOfCheckPhase
